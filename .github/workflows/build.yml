name: Build & Release

on:
  push:
    branches: [main]
  create:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: ver
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      # ── Chrome ──────────────────────────────────────────────
      - name: Build Chrome zip
        run: |
          mkdir -p dist
          zip -r dist/mangalib-ultimate-chrome-v${{ steps.ver.outputs.version }}.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "dist/*" \
            --exclude "*.md" \
            --exclude "build.ps1" \
            --exclude "*.zip"

      # ── Firefox ─────────────────────────────────────────────
      - name: Build Firefox zip
        run: |
          # Копируем в temp и добавляем gecko-поле в manifest
          cp -r . /tmp/ff
          python3 - <<'PY'
          import json, os
          path = '/tmp/ff/manifest.json'
          m = json.load(open(path))
          m['browser_specific_settings'] = {
              'gecko': {
                  'id': 'mangalib-ultimate@maybegod2020',
                  'strict_min_version': '128.0'
              }
          }
          json.dump(m, open(path, 'w'), indent=2, ensure_ascii=False)
          PY

          cd /tmp/ff
          zip -r $GITHUB_WORKSPACE/dist/mangalib-ultimate-firefox-v${{ steps.ver.outputs.version }}.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "dist/*" \
            --exclude "*.md" \
            --exclude "build.ps1" \
            --exclude "*.zip"

      # ── Artifacts (всегда, даже без тега) ───────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-v${{ steps.ver.outputs.version }}
          path: dist/
          retention-days: 30

      # ── GitHub Release (только при создании тега v*) ────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.ver.outputs.version }}"
          body: |
            ## Mangalib Ultimate Helper v${{ steps.ver.outputs.version }}

            ### Установка
            **Chrome / Chromium / Edge:**
            1. Скачай `mangalib-ultimate-chrome-*.zip`
            2. Распакуй в любую папку
            3. Открой `chrome://extensions` → включи «Режим разработчика» → «Загрузить распакованное»

            **Firefox:**
            1. Скачай `mangalib-ultimate-firefox-*.zip`
            2. Открой `about:debugging` → «Этот Firefox» → «Загрузить временное дополнение» → выбери zip

            ### Что нового
            _См. коммиты с момента предыдущего тега._
          files: dist/*
          generate_release_notes: false
