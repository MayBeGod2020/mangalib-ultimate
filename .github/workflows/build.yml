name: Build & Release

on:
  push:
    branches: [main]
  create:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: ver
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Build zip (один файл для Chrome и Firefox)
        run: |
          mkdir -p dist
          zip -r dist/mangalib-ultimate-v${{ steps.ver.outputs.version }}.zip \
            manifest.json \
            background.js \
            main.js \
            lib/ \
            modules/ \
            icons/ \
            privacy-policy.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mangalib-ultimate-v${{ steps.ver.outputs.version }}
          path: dist/
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.ver.outputs.version }}"
          body: |
            ## Mangalib Ultimate Helper v${{ steps.ver.outputs.version }}

            ### Установка Chrome / Edge
            1. Скачай zip → распакуй в папку
            2. `chrome://extensions` → Режим разработчика → Загрузить распакованное

            ### Установка Firefox
            1. Скачай zip
            2. `about:debugging` → Этот Firefox → Загрузить временное дополнение → выбери zip

            _Или установи через [Chrome Web Store](https://chrome.google.com/webstore) / [Firefox Add-ons](https://addons.mozilla.org)_
          files: dist/*
          generate_release_notes: false
